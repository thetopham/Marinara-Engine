# ──────────────────────────────────────────────
# Build & push Container image to GitHub Container Registry (ghcr.io)
# ──────────────────────────────────────────────
# Triggers:
#   • Push to staging         → ghcr.io/pasta-devs/marinara-engine:staging
#   • Push to main            → ghcr.io/pasta-devs/marinara-engine:sha-abc1234
#   • Tag v*                  → ghcr.io/pasta-devs/marinara-engine:2.0.0 + :latest
#   • Manual workflow_dispatch → same tags as the selected branch or tag
# ──────────────────────────────────────────────
name: Build & Push Container Image

on:
  push:
    branches: [main, staging]
    tags: ["v*"]
    paths-ignore:
      # Documentation & metadata
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "*.txt"
      # Tooling configs
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".markdownlint.json"
      - ".prettierignore"
      - ".prettierrc"
      # Compose / launcher / migration scripts
      - "docker-compose.yml"
      - "migrate-presets.cjs"
      - "migrate-variables.cjs"
      - "start.bat"
      - "start.sh"
      - "start-termux.sh"
      # Platform-specific sources
      - "android/**"
      - "win/**"
      - "MarinaraLauncher.exe"
      # GitHub community files
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # github.repository can have uppercase (Pasta-Devs/Marinara-Engine)
      # but Docker image refs must be all-lowercase
      - name: Lowercase image name
        id: lower
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          tags: |
            # On push to staging → :staging
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            # On push to main → :sha-<short> :main
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            # On tag push → :1.2.3, :1.2, :1, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.lower.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lowercase image name
        id: lower
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          tags: |
            # On push to staging → :staging
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            # On push to main → :sha-<short> :main
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            # On tag push → :1.2.3, :1.2, :1, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        id: manifest
        working-directory: /tmp/digests
        run: |
          image="${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}"
          tag_args=()
          while IFS= read -r tag; do
            tag_args+=("-t" "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_args=()
          for digest_file in *; do
            digest_args+=("${image}@sha256:${digest_file}")
          done
          if [ "${#digest_args[@]}" -eq 0 ]; then
            echo "No digest files found" >&2
            exit 1
          fi
          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
          # Get the digest of the pushed manifest list using raw format
          digest=$(docker buildx imagetools inspect "$image:${{ steps.meta.outputs.version }}" --raw | sha256sum | cut -d' ' -f1 | sed 's/^/sha256:/')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}:${{ steps.meta.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
