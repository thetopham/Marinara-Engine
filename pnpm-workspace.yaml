packages:
  - "packages/*"

# Supply-chain guardrails: delay newly published package versions long enough for
# registry takedowns and advisory systems to catch common compromise waves.
minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: false
trustPolicy: no-downgrade
blockExoticSubdeps: true

# Native/build dependencies permitted to run install scripts.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - onnxruntime-node
  - protobufjs

# Dependency version pins applied across the workspace.
overrides:
  onnxruntime-common: "1.24.3"
  onnxruntime-node: "1.24.3"
  onnxruntime-web: "1.24.3"
  protobufjs: "7.5.5"
  brace-expansion: "5.0.5"
  "@anthropic-ai/sdk": "0.93.0"
